name: Pre-Deployment Readiness Check

# 部署前检查：架构合规性、README完整性
# Dev-notes 检查已由 code-quality.yml 负责
# Examples 已迁移到独立仓库，不再在此检查

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-readiness:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip version bump commits - deployment readiness already validated
    if: ${{ !contains(github.event.head_commit.message, '[version bump]') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史来进行 diff
          # 注意: 仅检出当前仓库代码；外部独立仓库在各自仓库维护

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          echo "📦 安装检查工具依赖..."
          pip install --upgrade pip
          pip install pyyaml

          # 使用 quickstart.sh 安装 SAGE（开发模式，用于 sage-dev 命令）
          echo "📦 使用 quickstart.sh 安装 SAGE（开发模式）..."
          chmod +x ./quickstart.sh
          ./quickstart.sh --dev --yes

          echo "✅ SAGE 包安装完成"

      # Dev-notes 检查已由 code-quality.yml 负责，此处跳过

      - name: Architecture Compliance Check
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "🏗️ 运行架构合规性检查..."

          # 在 PR 中仅检查变更文件
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "📝 PR 模式：检查变更的 Python 文件"

            # 检查是否有 Python 文件变更
            PYTHON_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' || true)

            if [ -n "$PYTHON_CHANGED" ]; then
              echo "📝 发现 Python 文件变更"
              # NOTE: legacy flags (e.g. --architecture/--no-ruff) were removed from current sage-dev CLI.
              # Use the supported quality entrypoint to keep CI compatible with the in-tree command surface.
              sage-dev quality --check-only || {
                  echo ""
                  echo "❌ 架构合规性检查失败！"
                  echo ""
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "💡 常见问题修复："
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "1. 检查跨层级导入（如 app 导入 kernel）"
                  echo "2. 确保导入路径符合包架构"
                  echo "3. 查看项目质量命令: sage-dev quality --help"
                  echo "4. 查看文档: https://intellistream.github.io/sage-docs/architecture/layer-ownership/"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  exit 1
                }
            else
              echo "ℹ️  没有 Python 文件变更，跳过架构检查"
            fi
          else
            echo "📦 Push 模式：快速检查（仅检查变更文件）"
            # 在 push 时做快速检查，避免阻塞
            sage-dev quality --check-only || {
              echo ""
              echo "⚠️  发现架构问题，但不阻塞部署"
              echo "请查看质量命令帮助: sage-dev quality --help"
              echo "并尽快参考: https://intellistream.github.io/sage-docs/architecture/layer-ownership/"
            }
          fi

          echo ""
          echo "✅ 架构检查完成"

      - name: Package README Check
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "📖 检查包 README 文档..."

          if sage-dev quality --check-only --readme; then
            echo "✅ 所有包的 README 文档完整"
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "💡 修复建议："
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "1. 确保每个包都有 README.md"
              echo "2. README 应包含：简介、安装、使用示例"
              echo "3. 使用主仓 README 模板（如适用）并遵循 CONTRIBUTING/DEVELOPER 文档约定"
              echo "4. 查看详细报告: sage-dev quality readme --report"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 1
            else
              echo "⚠️  README 检查失败，但不阻塞部署"
            fi
          fi

      - name: Generate Deployment Report
        if: always()
        run: |
          echo "📊 生成部署就绪报告..."

          # 统计信息
          TOTAL_PACKAGES=$(find packages -name "setup.py" -o -name "pyproject.toml" | wc -l)
          TOTAL_DOCS=$(find docs -name "*.md" -type f 2>/dev/null | wc -l)

          echo "📦 包数量: $TOTAL_PACKAGES"
          echo "📚 文档数量: $TOTAL_DOCS"

          # 检查关键文件
          echo ""
          echo "🔍 关键文件检查:"

          CRITICAL_FILES=(
            "README.md"
            "CONTRIBUTING.md"
            "LICENSE"
            ".pre-commit-config.yaml"
          )

          for file in "${CRITICAL_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ $file 缺失"
            fi
          done

          echo ""
          echo "✅ 部署报告生成完成"

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 部署就绪检查总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **检查通过** - 代码已就绪可以部署" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "检查项目:" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ 架构合规性" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Package README 完整性" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 📝 Dev-notes 文档检查由 code-quality.yml 负责" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **检查失败** - 发现部署阻塞问题" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请查看上方日志了解详细信息并修复问题。" >> $GITHUB_STEP_SUMMARY
          fi

name: Layer Consistency Check

on:
  pull_request:
    branches: [main, main-dev]
    paths:
      - "SAGE.code-workspace"
      - "README.md"
      - "docs/layer-manifest.json"
      - ".github/workflows/ci-layer-consistency.yml"
      - "tools/scripts/check_layer_manifest_sync.py"
      - "ARCHITECTURE_LAYER_OWNERSHIP_MATRIX_V1.md"
  push:
    branches: [main, main-dev]
    paths:
      - "SAGE.code-workspace"
      - "README.md"
      - "docs/layer-manifest.json"
      - ".github/workflows/ci-layer-consistency.yml"
      - "tools/scripts/check_layer_manifest_sync.py"
      - "ARCHITECTURE_LAYER_OWNERSHIP_MATRIX_V1.md"
  workflow_dispatch:

concurrency:
  group: layer-consistency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layer-consistency:
    name: Validate layer manifest and workspace labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SAGE
        uses: actions/checkout@v4

      - name: Checkout referenced satellite repositories
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TARGET_BRANCH="${BASE_REF:-${REF_NAME:-main-dev}}"
          echo "Target branch for satellite checkout: ${TARGET_BRANCH}"

          repos=(
            sage-common
            sage-platform
            sage-kernel
            sage-libs
            sage-middleware
            sage-cli
            sage-dev-tools
            sage-studio
            sagellm-protocol
            sagellm-comm
            sagellm-backend
            sagellm-kv-cache
            sagellm-compression
            sagellm-core
            sagellm-control-plane-benchmark
            sagellm-control-plane
            sagellm-gateway
          )

          for repo in "${repos[@]}"; do
            echo "Cloning intellistream/${repo}..."
            repo_url="https://x-access-token:${GH_TOKEN}@github.com/intellistream/${repo}.git"
            branch_to_clone="main"
            if git ls-remote --exit-code --heads "${repo_url}" "${TARGET_BRANCH}" > /dev/null; then
              branch_to_clone="${TARGET_BRANCH}"
            fi
            echo "  ↳ using branch: ${branch_to_clone}"
            git clone --depth 1 --branch "${branch_to_clone}" "${repo_url}" "../${repo}"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run layer consistency check
        run: |
          python3 tools/scripts/check_layer_manifest_sync.py --strict-repos

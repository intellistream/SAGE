name: Code Quality Check

on:
  pull_request:
    branches: [main, main-dev]
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '**.pyi'
      - 'tools/config/pre-commit-config.yaml'
      - 'tools/config/ruff.toml'
      - 'tools/hooks/**'
      - '.github/workflows/ci-code-quality.yml'
  push:
    branches: [main, main-dev]
    paths:
      - '**.py'
      - '**.pyi'
      - 'tools/hooks/**'
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout sageFlownet (for dedup gate)
        uses: actions/checkout@v4
        with:
          repository: intellistream/sageFlownet
          path: sageFlownet
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('tools/config/pre-commit-config.yaml') }}

      - name: Install tools (no SAGE)
        run: |
          pip install --upgrade pip
          pip install pre-commit ruff

      - name: Configure Git for large diffs
        run: |
          git config diff.renameLimit 10000
          git config merge.renameLimit 10000

      - name: Install shellcheck (fallback for CI)
        run: |
          # Install shellcheck directly to avoid shellcheck-py network issues
          sudo apt-get update && sudo apt-get install -y shellcheck || echo "shellcheck install failed, will skip"

      - name: Run pre-commit (changed files only)
        if: github.event_name == 'pull_request'
        env:
          SKIP: shellcheck  # Skip shellcheck-py to avoid network issues, use system shellcheck instead
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD | grep -E '\.(py|pyi)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No Python files changed, skipping"
            exit 0
          fi
          echo "$CHANGED" | xargs pre-commit run --config tools/config/pre-commit-config.yaml --files

      - name: Run pre-commit (all files)
        if: github.event_name != 'pull_request'
        env:
          SKIP: shellcheck  # Skip shellcheck-py to avoid network issues, use system shellcheck instead
        run: |
          pre-commit run --all-files --config tools/config/pre-commit-config.yaml

      - name: Check CLI Ray terminology (Issue #1438)
        run: |
          bash tools/hooks/check_cli_ray_terminology.sh --all-files
      - name: Layer check – sage-libs (L3) must not import sage.middleware (L4) [Issue #1453]
        run: |
          bash tools/hooks/check_libs_middleware_import.sh --all-files
      - name: Layer check – sage-common (L1) must not import L3+ packages [Issue #1452]
        run: |
          set +e
          violations=$(grep -rn \
            --include="*.py" \
            -e "from sage\.kernel" \
            -e "from sage\.middleware" \
            -e "from sage\.platform" \
            packages/sage-common/src \
            | grep -v "#.*from sage\." \
            | grep -v "must NOT import" \
            | grep -v "TYPE_CHECKING" \
            || true)
          if [ -n "$violations" ]; then
            echo "::error::sage-common (L1) contains upward layer imports:"
            echo "$violations" | while IFS= read -r line; do
              file=$(echo "$line" | cut -d: -f1)
              lineno=$(echo "$line" | cut -d: -f2)
              echo "::error file=$file,line=$lineno::sage-common L1 violation: $line"
            done
            echo ""
            echo "FAILED: sage-common must not import sage.kernel / sage.middleware / sage.platform"
            exit 1
          fi
          echo "✓ sage-common layer check passed"
      - name: Layer check – sage-tools undeclared sage.data imports [Issue #1454]
        run: |
          set +e
          # Flag only unindented (top-level) sage.data imports.
          # grep output format: file:lineno:content
          # Legitimate lazy imports are always indented (inside try/function bodies).
          top_level=$(grep -rn --include="*.py" "from sage\.data\|import sage\.data" \
            packages/sage-tools/src \
            | grep -v "TYPE_CHECKING" \
            | awk -F: 'NF>=3 { rest=$0; sub(/^[^:]*:[^:]*:/, "", rest); if (rest !~ /^[[:space:]]/) print $0 }' \
            || true)
          if [ -n "$top_level" ]; then
            echo "::error::sage-tools has module-level (non-lazy) sage.data imports:"
            echo "$top_level" | while IFS= read -r line; do
              file=$(echo "$line" | cut -d: -f1)
              lineno=$(echo "$line" | cut -d: -f2)
              echo "::error file=$file,line=$lineno::Top-level sage.data import: $line"
            done
            echo ""
            echo "FAILED: Use lazy imports (inside try/except) and declare isage-data in pyproject.toml extras"
            exit 1
          fi
          echo "✓ sage-tools sage.data import check passed"
      - name: Cross-repo dedup check - SAGE vs sageFlownet (Issue #1439)
        run: |
          python3 tools/scripts/check_cross_repo_dedup.py \
            --flownet-path "$GITHUB_WORKSPACE/sageFlownet" \
            --require-flownet \
            --verbose
        continue-on-error: false

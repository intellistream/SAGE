name: "Flownet Migration: Layer-Stratified Tests"
# CI workflow for Issue intellistream/SAGE#1440
# Runs the three Flownet-migration test layers as independent jobs so that
# each layer produces a separate pass/fail signal.
#
# Layer taxonomy is documented in:
#   packages/sage-kernel/docs/test-taxonomy.md
#
# Trigger paths: any change to the kernel or platform migration modules,
# or to the test files that implement the three layers.

on:
  push:
    branches: [main, main-dev]
    paths:
      - 'packages/sage-kernel/src/sage/kernel/flow/**'
      - 'packages/sage-kernel/src/sage/kernel/facade/**'
      - 'packages/sage-platform/src/sage/platform/runtime/**'
      - 'packages/sage-kernel/tests/declaration/**'
      - 'packages/sage-kernel/tests/contract/**'
      - 'packages/sage-kernel/tests/adapter/**'
      - 'packages/sage-common/src/sage/common/core/flow_exceptions.py'
      - 'packages/sage-common/src/sage/common/utils/context_vars.py'
      - '.github/workflows/ci-flownet-layer-tests.yml'
  pull_request:
    branches: [main, main-dev]
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/sage-kernel/src/sage/kernel/flow/**'
      - 'packages/sage-kernel/src/sage/kernel/facade/**'
      - 'packages/sage-platform/src/sage/platform/runtime/**'
      - 'packages/sage-kernel/tests/declaration/**'
      - 'packages/sage-kernel/tests/contract/**'
      - 'packages/sage-kernel/tests/adapter/**'
      - 'packages/sage-common/src/sage/common/core/flow_exceptions.py'
      - 'packages/sage-common/src/sage/common/utils/context_vars.py'
      - '.github/workflows/ci-flownet-layer-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CACHE_VERSION: v1-flownet-layer-tests

# ---------------------------------------------------------------------------
# Shared installation step (as reusable composite, inlined per job below)
# ---------------------------------------------------------------------------
# Each job performs a minimal SAGE install (core packages only, no C++
# extensions and no optional heavy deps) so that Layer 1 and Layer 2 tests
# remain lightweight.
# ---------------------------------------------------------------------------

jobs:
  # =========================================================================
  # Layer 1: Declaration unit tests
  # No sageFlownet dependency; must pass on every PR.
  # =========================================================================
  test-layer-declaration:
    name: "Layer 1 — Declaration + Context Propagation Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !contains(github.event.head_commit.message, '[version bump]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install SAGE core packages (minimal)
        run: |
          pip install --upgrade pip
          # Install only the packages required for declaration-layer tests.
          # Intentionally NO sageFlownet so we verify the no-runtime-dep contract.
          pip install -e packages/sage-common -e packages/sage-platform \
                      -e packages/sage-kernel \
                      --no-deps --quiet || \
          pip install -e packages/sage-common -e packages/sage-platform \
                      -e packages/sage-kernel --quiet
          pip install pytest pytest-timeout

      - name: "Layer 1: Duplicate ContextSlot symbol check (Issue #1435)"
        run: |
          echo "🔍 Checking for duplicate ContextSlot in sageFlownet..."
          # The file sage/flownet/utils/context_vars.py must NOT exist.
          # If it re-appears (e.g. via a stale merge), this step blocks CI.
          if find . -path '*/sage/flownet/utils/context_vars.py' | grep -q .; then
            echo "❌ DUPLICATE FOUND: sage/flownet/utils/context_vars.py exists!"
            echo "   Issue #1435 requires this file to be deleted."
            echo "   Migrate all imports to: from sage.common.utils import ContextSlot"
            exit 1
          fi
          echo "✅ No duplicate ContextSlot found in sageFlownet."

      - name: "Layer 1: Run declaration + context propagation unit tests"
        run: |
          echo "📋 Layer 1 — Declaration + Context Propagation unit tests (no runtime dependency)"
          python -m pytest \
            packages/sage-common/tests/unit/utils/test_context_vars.py \
            packages/sage-kernel/tests/declaration/test_flow_declaration.py \
            packages/sage-kernel/tests/declaration/test_context_propagation.py \
            -v \
            --timeout 60 \
            --tb=short \
            -q \
            2>&1 | tee /tmp/layer1-results.txt
          echo "✅ Layer 1 passed" || echo "❌ Layer 1 FAILED"

      - name: Upload Layer 1 test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer1-declaration-results
          path: /tmp/layer1-results.txt
          retention-days: 7

  # =========================================================================
  # Layer 2: Facade / API contract tests
  # No sageFlownet dependency; must pass on every PR.
  # =========================================================================
  test-layer-contract:
    name: "Layer 2 — Facade/API Contract Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !contains(github.event.head_commit.message, '[version bump]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install SAGE core packages (minimal)
        run: |
          pip install --upgrade pip
          # Same minimal install as Layer 1 — no sageFlownet.
          pip install -e packages/sage-common -e packages/sage-platform \
                      -e packages/sage-kernel \
                      --no-deps --quiet || \
          pip install -e packages/sage-common -e packages/sage-platform \
                      -e packages/sage-kernel --quiet
          pip install pytest pytest-timeout

      - name: "Layer 2: Run facade / API contract tests"
        run: |
          echo "🔗 Layer 2 — Facade/API contract tests (no runtime dependency)"
          python -m pytest \
            packages/sage-kernel/tests/contract/test_facade_api.py \
            packages/sage-kernel/tests/contract/test_flow_exceptions.py \
            -v \
            --timeout 60 \
            --tb=short \
            -q \
            2>&1 | tee /tmp/layer2-results.txt
          echo "✅ Layer 2 passed" || echo "❌ Layer 2 FAILED"

      - name: Upload Layer 2 test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer2-contract-results
          path: /tmp/layer2-results.txt
          retention-days: 7

  # =========================================================================
  # Layer 3: Adapter integration tests
  # sageFlownet is NOT available in CI, so live-runtime tests are skipped.
  # The structural / protocol conformance tests always run.
  # =========================================================================
  test-layer-adapter:
    name: "Layer 3 — Adapter Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !contains(github.event.head_commit.message, '[version bump]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install SAGE core packages (minimal, no sageFlownet)
        run: |
          pip install --upgrade pip
          # Minimal install — sageFlownet (isage-flow) intentionally absent.
          # Tests that require it are marked skipif and will be skipped.
          pip install -e packages/sage-common -e packages/sage-platform \
                      -e packages/sage-kernel \
                      --no-deps --quiet || \
          pip install -e packages/sage-common -e packages/sage-platform \
                      -e packages/sage-kernel --quiet
          pip install pytest pytest-timeout

      - name: "Layer 3: Run adapter integration tests"
        # This job must not fail just because sageFlownet is absent.
        # Live-execution tests are skipif-guarded.
        run: |
          echo "🔌 Layer 3 — Adapter integration tests"
          echo "   Note: live-runtime tests are skipped (sageFlownet not installed)"
          python -m pytest \
            packages/sage-kernel/tests/adapter/ \
            -v \
            --timeout 60 \
            --tb=short \
            -q \
            2>&1 | tee /tmp/layer3-results.txt
          echo "✅ Layer 3 passed (live tests may have been skipped)" || echo "❌ Layer 3 FAILED"

      - name: Upload Layer 3 test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer3-adapter-results
          path: /tmp/layer3-results.txt
          retention-days: 7

  # =========================================================================
  # Aggregator: collect all three layer results
  # =========================================================================
  report:
    name: "Migration Test Layers — Summary"
    runs-on: ubuntu-latest
    needs: [test-layer-declaration, test-layer-contract, test-layer-adapter]
    if: always()

    steps:
      - name: Download all layer results
        uses: actions/download-artifact@v4
        with:
          path: /tmp/layer-results

      - name: Print summary
        run: |
          echo "======================================================"
          echo " Flownet Migration Test Layers — CI Summary"
          echo " intellistream/SAGE#1440"
          echo "======================================================"
          echo ""
          echo "Layer 1 — Declaration (no runtime dep):"
          echo "  Status: ${{ needs.test-layer-declaration.result }}"
          echo ""
          echo "Layer 2 — Facade/API Contract (no runtime dep):"
          echo "  Status: ${{ needs.test-layer-contract.result }}"
          echo ""
          echo "Layer 3 — Adapter Integration (runtime optional):"
          echo "  Status: ${{ needs.test-layer-adapter.result }}"
          echo ""

          # Exit non-zero if any layer failed
          if [[ "${{ needs.test-layer-declaration.result }}" != "success" ]] || \
             [[ "${{ needs.test-layer-contract.result }}"    != "success" ]] || \
             [[ "${{ needs.test-layer-adapter.result }}"     != "success" ]]; then
            echo "❌ One or more migration test layers FAILED."
            echo "   Fix boundary regressions before merging."
            exit 1
          fi
          echo "✅ All migration test layers passed."

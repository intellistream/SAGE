name: Test Environment Isolation and Cleanup

on:
  push:
    branches: [main]
    paths:
      - "tools/install/installers/environment_config.sh"
      - "tools/install/installers/argument_parser.sh"
      - "tools/install/cleanup/**"
      - "tools/install/tests/test_*.sh"
      - ".github/workflows/test-env-cleanup.yml"
  pull_request:
    branches: [main]
    paths:
      - "tools/install/installers/environment_config.sh"
      - "tools/install/installers/argument_parser.sh"
      - "tools/install/cleanup/**"
      - "tools/install/tests/test_*.sh"
      - ".github/workflows/test-env-cleanup.yml"

jobs:
  # 测试单元测试脚本
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run environment config unit tests
        run: |
          bash tools/install/tests/test_environment_config.sh

      - name: Run cleanup tools unit tests
        run: |
          bash tools/install/tests/test_cleanup_tools.sh

  # 测试安装跟踪和清理流程
  test-install-tracking:
    name: Test Install Tracking and Cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Test track_install.sh
        run: |
          # 测试记录安装信息
          mkdir -p .sage

          bash tools/install/cleanup/track_install.sh pre-install
          bash tools/install/cleanup/track_install.sh post-install "dev" "pip" "false"

          # 验证文件创建
          if [ -f .sage/install_info.json ]; then
            echo "✅ Install info file created"
            cat .sage/install_info.json
          else
            echo "❌ Install info file not created"
            exit 1
          fi

          # 测试 show 命令
          bash tools/install/cleanup/track_install.sh show
          bash tools/install/cleanup/track_install.sh info

      - name: Test uninstall_sage.sh with --yes flag
        run: |
          # 测试非交互式卸载
          bash tools/install/cleanup/uninstall_sage.sh --yes || true

          # 验证脚本可以处理 --help
          bash tools/install/cleanup/uninstall_sage.sh --help

  # 端到端集成测试
  e2e-test:
    name: End-to-End Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Test complete workflow without venv
        run: |
          # 完整的安装-使用-清理流程

          # 1. 使用非 venv 模式安装
          ./quickstart.sh --pip --yes || {
            echo "⚠️ Installation failed, checking logs..."
            find .sage -name "*.log" -type f -exec tail -20 {} \;
            exit 1
          }

          # 2. 验证安装
          python --version
          pip list | grep -i sage || true

          # 3. 检查安装跟踪
          bash tools/install/cleanup/track_install.sh show

          # 4. 测试清理
          bash tools/install/cleanup/uninstall_sage.sh --yes

          echo "✅ Complete workflow test passed"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            .sage/logs/
            .sage/install_info.json
          retention-days: 7

      # 验证清理脚本存在
      - name: Verify cleanup scripts
        run: |
          test -f tools/install/cleanup/track_install.sh
          test -f tools/install/cleanup/uninstall_sage.sh

          # 验证环境管理功能在代码中存在
          grep -q "detect_virtual_environment" tools/install/installers/environment_config.sh
          grep -q "SAGE_VENV_POLICY" tools/install/installers/environment_config.sh

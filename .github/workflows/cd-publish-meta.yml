# Publish the SAGE meta-package (isage) to PyPI / TestPyPI
#
# The meta-package (packages/sage/) depends on all standalone SAGE sub-repos.
# Publishing it signals that a coherent ecosystem snapshot is available at
# the given version.
#
# Trigger options
# ────────────────
#   Manual (workflow_dispatch):  choose repository + whether to auto-bump version
#   Tag push (v*.*.*.*):         auto-publishes to PyPI when a release tag is pushed

name: Publish isage meta-package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target repository"
        required: false
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      bump_version:
        description: "Bump BUILD digit before publishing (e.g. 0.2.4.20 → 0.2.4.21)"
        required: false
        default: "false"
        type: boolean

  push:
    tags:
      - "v*.*.*.*"   # e.g. v0.2.4.20

jobs:
  publish-meta:
    name: Build & publish isage
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed if we create/push a version bump commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          pip install --upgrade pip build wheel twine
          pip install "wheelwright @ git+https://github.com/intellistream/wheelwright.git@main"

      - name: Determine target repository
        id: repo
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "target=pypi" >> "$GITHUB_OUTPUT"
          else
            echo "target=${{ inputs.repository }}" >> "$GITHUB_OUTPUT"
          fi

      - name: (Optional) Bump BUILD digit in _version.py
        if: ${{ inputs.bump_version == 'true' }}
        run: |
          VERSION_FILE="src/sage/_version.py"
          CURRENT=$(python3 -c "
          import re, pathlib
          t = pathlib.Path('$VERSION_FILE').read_text()
          m = re.search(r'__version__\s*=\s*\"([^\"]+)\"', t)
          print(m.group(1))
          ")
          # Increment last digit
          NEW=$(python3 -c "
          v = '$CURRENT'.split('.')
          v[-1] = str(int(v[-1]) + 1)
          print('.'.join(v))
          ")
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" "$VERSION_FILE"
          echo "Bumped version: $CURRENT → $NEW"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VERSION_FILE"
          git commit -m "chore(release): bump isage version $CURRENT → $NEW [skip ci]"
          git push

      - name: Configure PyPI credentials
        env:
          PYPI_TOKEN:      ${{ secrets.PYPI_API_TOKEN }}
          TESTPYPI_TOKEN:  ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          mkdir -p ~/.config/pip
          if [ "${{ steps.repo.outputs.target }}" = "pypi" ]; then
            cat > ~/.pypirc << EOF
          [distutils]
          index-servers = pypi
          [pypi]
          username = __token__
          password = $PYPI_TOKEN
          EOF
          else
            cat > ~/.pypirc << EOF
          [distutils]
          index-servers = testpypi
          [testpypi]
          repository = https://test.pypi.org/legacy/
          username = __token__
          password = $TESTPYPI_TOKEN
          EOF
          fi

      - name: Build wheel
        run: python3 -m build --wheel --sdist

      - name: Publish to ${{ steps.repo.outputs.target }}
        env:
          TWINE_REPOSITORY: ${{ steps.repo.outputs.target }}
        run: |
          twine upload \
            --config-file ~/.pypirc \
            --repository ${{ steps.repo.outputs.target }} \
            --skip-existing \
            dist/*

      - name: Summary
        if: always()
        run: |
          VERSION=$(python3 -c "
          import re, pathlib
          t = pathlib.Path('src/sage/_version.py').read_text()
          m = re.search(r'__version__\s*=\s*\"([^\"]+)\"', t)
          print(m.group(1))
          ")
          TARGET="${{ steps.repo.outputs.target }}"

          echo "## 📦 isage $VERSION published to $TARGET" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$TARGET" = "pypi" ]; then
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "pip install isage==$VERSION" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "pip install --pre --extra-index-url https://test.pypi.org/simple/ isage==$VERSION" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

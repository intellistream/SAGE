# DEPRECATED (#1466) — Historical split-repo build/test orchestration has been
# replaced by the consolidated main-repo workflow plus independent optional
# adapter/tooling repos. This workflow is preserved for reference only.
# Cross-repo smoke tests: see ci-integration.yml

name: "Build and Test (monorepo)"

on:
  workflow_dispatch: # manual only — automatic triggers removed (#1466)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  SILICONCLOUD_API_KEY: ${{ secrets.SILICONCLOUD_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
  ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
  GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  HF_ENDPOINT: https://hf-mirror.com
  CACHE_VERSION: v2-simplified-prod

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60 # 278 个测试需要更多时间
    # Skip version bump commits to avoid unnecessary CI runs
    if: ${{ !contains(github.event.head_commit.message, '[version bump]') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          clean: true

      - name: Set up Python 3.11
        if: ${{ env.ACT != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Python 3.11 (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect LLM endpoint (prefer local)
        run: |
          # CI fallback only: DashScope is explicit fallback for CI environment
          # Local development should NOT use this; always prefer local endpoints
          DEFAULT_BASE="https://dashscope.aliyuncs.com/compatible-mode/v1"
          SELECTED_BASE="$DEFAULT_BASE"
          for port in 8888 8901; do
            if curl -s "http://localhost:${port}/v1/models" > /dev/null 2>&1; then
              SELECTED_BASE="http://localhost:${port}/v1"
              break
            fi
          done
          echo "OPENAI_BASE_URL=$SELECTED_BASE" >> $GITHUB_ENV

      - name: Create .env File from Secrets
        run: |
          echo "🔐 从 GitHub Secrets 创建 .env 文件..."
          cat > .env << EOF
          # CI Environment Configuration (Auto-generated from GitHub Secrets)

          # LLM Service API Keys
          OPENAI_API_KEY=${{ secrets.ALIBABA_API_KEY }}
          OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
          OPENAI_MODEL_NAME=qwen-turbo-2025-02-11

          SILICONCLOUD_API_KEY=${{ secrets.SILICONCLOUD_API_KEY }}
          JINA_API_KEY=${{ secrets.JINA_API_KEY }}
          ALIBABA_API_KEY=${{ secrets.ALIBABA_API_KEY }}

          SAGELLM_API_KEY=EMPTY
          SAGELLM_BASE_URL=http://localhost:8901/v1
          SAGELLM_MODEL_NAME=Qwen/Qwen2.5-7B-Instruct

          WEB_SEARCH_API_KEY=${{ secrets.WEB_SEARCH_API_KEY }}

          # GitHub Token
          GIT_TOKEN=${{ secrets.GIT_TOKEN }}

          # Hugging Face
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          HF_ENDPOINT=https://hf-mirror.com

          # CI/CD Settings
          SAGE_DEBUG=false
          SAGE_SKIP_CPP_EXTENSIONS=false
          SAGE_LOG_LEVEL=INFO
          SAGE_TEST_MODE=true

          # Ray Configuration (fix ray.dag.compiled_dag_node error)
          RAY_ACCEL_ENV_VAR_OVERRIDE_ON_ZERO=0
          EOF

          echo "✅ .env 文件创建完成"

      - name: Install System Dependencies
        run: |
          echo "🔧 安装系统依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            libopenblas-dev \
            liblapack-dev \
            git

          echo "✅ 系统依赖安装完成"

      - name: Install SAGE
        run: |
          echo "🚀 安装SAGE（开发模式，可编辑安装 + C++扩展）..."

          export PATH="$HOME/.local/bin:$PATH"

          # 使用 CI 安装包装器，确保与本地安装方式一致
          chmod +x ./tools/install/installers/ci_install_wrapper.sh
          chmod +x ./quickstart.sh

          echo "开始安装..."
          # 使用开发模式，这样会进行可编辑安装（pip install -e），.so文件会在源码目录中
          ./tools/install/installers/ci_install_wrapper.sh --dev --yes

          echo "✅ 安装完成"
        timeout-minutes: 25

      - name: Persist user-local CLI path
        run: |
          # core_installer 在 CI 模式使用 --user 安装，确保后续 step 可找到 ~/.local/bin 下的命令
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Optional Dependencies
        run: |
          echo "📦 安装可选依赖（用于测试）..."
          export PATH="$HOME/.local/bin:$PATH"

          # 安装可选的算法库（测试需要）
          pip install --no-cache-dir \
            isage-agentic \
            isage-finetune \
            isage-rag \
            isage-eval \
            isage-privacy \
            isage-safety \
            isage-data

          # 安装向量数据库SDK（测试需要）
          pip install --no-cache-dir \
            pymilvus \
            chromadb

          # 安装AI工具SDK（测试需要）
          pip install --no-cache-dir \
            easyocr \
            ollama \
            tenacity \
            zhipuai \
            cohere \
            boto3 \
            datasets \
            torch \
            torchvision \
            transformers \
            peft \
            numpy

          # 安装测试依赖（MCP server tests需要）
          pip install --no-cache-dir \
            fastapi \
            httpx

          echo "✅ 可选依赖安装完成"

      - name: Verify PyPI Packages
        run: |
          echo "📦 验证独立 PyPI 包安装状态..."

          # 这些组件已独立为 PyPI 包，不再作为 C++ 扩展编译
          declare -a packages=(
            "isage-vdb:sagevdb:SageVDB 向量数据库"
            "isage-flow:sage_flow:SageFlow 流处理引擎"
            "isage-tsdb:sage_tsdb:SageTSDB 时序数据库"
            "isage-refiner:sage_refiner:SageRefiner 上下文压缩"
          )

          available=0
          total=${#packages[@]}

          echo ""
          echo "🔍 检查独立包安装状态:"
          for pkg_info in "${packages[@]}"; do
            IFS=':' read -r pip_name module_name display_name <<< "$pkg_info"

            # 使用临时文件捕获输出，避免管道导致的子shell问题
            if python -c "import ${module_name}" 2>/dev/null; then
              version=$(python -c "import ${module_name}; print(getattr(${module_name}, '__version__', 'unknown'))" 2>/dev/null || echo "unknown")
              echo "  ✅ ${display_name} (${pip_name}): ${version}"
              available=$((available + 1))
            else
              echo "  ⚠️  ${display_name} (${pip_name}): 不可用"
              echo "     安装命令: pip install ${pip_name}"
            fi
          done

          echo ""
          echo "📊 总结: ${available}/${total} 个包可用"

          if [ $available -lt $total ]; then
            echo ""
            echo "⚠️ 警告: 部分包不可用 ($((total - available))/${total})"
            echo "   某些高级功能可能受限，但不影响核心功能"
            echo "   这是预期行为 - 这些包是可选依赖"
          else
            echo ""
            echo "✅ 所有独立包已正确安装"
          fi

      - name: Verify Installation
        run: |
          echo "✅ 验证SAGE安装..."
          python -c "import sage; print('✅ SAGE imported')"
          python -c "import sage.common; print('✅ sage.common imported')"

          # 验证CLI：优先 PATH 中的命令，失败时回退到 python -m（避免 PATH 未持久化导致误判）
          if command -v sage-dev >/dev/null 2>&1; then
            sage-dev --help > /dev/null && echo "✅ sage-dev CLI可用 (PATH)"
          elif python -m sage.tools.cli.commands.dev --help > /dev/null 2>&1; then
            echo "⚠️ sage-dev 不在 PATH 中，但模块可执行 (python -m)"
            echo "✅ sage-dev CLI可用 (module fallback)"
          else
            echo "❌ sage-dev CLI不可用（PATH 与 python -m 均失败）"
            exit 1
          fi

      - name: Set up Directories
        run: |
          echo "📁 创建必要的目录结构..."
          mkdir -p .sage/reports
          mkdir -p .sage/logs
          echo "✅ 目录创建完成"

      # Note: sage-studio has been moved to an independent repository
      # (https://github.com/intellistream/sage-studio)
      # Frontend checks are no longer part of the main SAGE CI pipeline

      - name: Run installation validation suite
        run: |
          echo "🔍 Running installation verification suite..."
          bash tools/install/tests/verify_installation.sh

      - name: Run Unit Tests with Coverage
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "🧪 运行单元测试并收集覆盖率..."
          echo "使用 sage-dev project test --coverage 命令"

          # 使用 in-tree sage-dev 运行测试：
          # - 仅保留当前 CLI 支持的参数
          # - 通过 `--` 透传 pytest 参数，生成与后续上传一致的覆盖率产物
          sage-dev project test --coverage \
            -- \
            --cov-report=term-missing \
            --cov-report=xml:.sage/coverage/coverage.xml \
            --cov-report=html:.sage/coverage/htmlcov || {
              echo "❌ 测试失败"
              exit 1
            }

          # 将覆盖率文件移动到根目录以便上传
          if [ -f ".sage/coverage/coverage.xml" ]; then
            cp .sage/coverage/coverage.xml ./coverage.xml
            echo "✅ 覆盖率XML文件已复制到根目录"
          else
            echo "⚠️ 警告: 未找到覆盖率XML文件"
          fi

          # 复制HTML报告
          if [ -d ".sage/coverage/htmlcov" ]; then
            mkdir -p coverage_html
            cp -r .sage/coverage/htmlcov/* coverage_html/
            echo "✅ HTML覆盖率报告已复制"
          fi

      # Token-only upload: predictable on GitHub-hosted runners and skipped for local `act` runs.
      - name: Upload Coverage to Codecov
        if: ${{ hashFiles('coverage.xml') != '' && env.CODECOV_TOKEN != '' && env.ACT != 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-sage
          fail_ci_if_error: false
          verbose: true

      - name: Note skipped Codecov upload
        if: ${{ always() && (hashFiles('coverage.xml') == '' || env.CODECOV_TOKEN == '' || env.ACT == 'true') }}
        run: |
          reasons=()

          if [ ! -f coverage.xml ]; then
            reasons+=("coverage.xml not generated")
          fi

          if [ -z "${CODECOV_TOKEN}" ]; then
            reasons+=("CODECOV_TOKEN is not configured")
          fi

          if [ "${ACT:-}" = "true" ]; then
            reasons+=("running under act local runner")
          fi

          if [ ${#reasons[@]} -gt 0 ]; then
            printf '### Codecov upload skipped\n\n' >> "$GITHUB_STEP_SUMMARY"
            printf 'Reasons:\n' >> "$GITHUB_STEP_SUMMARY"
            for reason in "${reasons[@]}"; do
              printf -- '- %s\n' "$reason" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

      - name: Upload Coverage Reports
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage_html/
            .sage/logs/
          retention-days: 30

      - name: Upload Test Logs on Failure
        if: ${{ failure() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            .sage/logs/
            .sage/reports/
          retention-days: 7

      - name: Note local artifacts under act
        if: ${{ always() && env.ACT == 'true' }}
        run: |
          echo "### 📦 Local run note (act)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "act 不提供 GitHub Artifact 服务，已跳过 artifact 上传步骤。" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          found_any=false

          if [ -f "coverage.xml" ]; then
            printf '%s\n' '- 覆盖率 XML: `coverage.xml`' >> "$GITHUB_STEP_SUMMARY"
            found_any=true
          fi

          if [ -d "coverage_html" ]; then
            printf '%s\n' '- 覆盖率 HTML: `coverage_html/`' >> "$GITHUB_STEP_SUMMARY"
            found_any=true
          fi

          if [ -d ".sage/logs" ]; then
            printf '%s\n' '- 日志目录: `.sage/logs/`' >> "$GITHUB_STEP_SUMMARY"
            found_any=true
          fi

          if [ -d ".sage/reports" ]; then
            printf '%s\n' '- 报告目录: `.sage/reports/`' >> "$GITHUB_STEP_SUMMARY"
            found_any=true
          fi

          if [ "$found_any" = false ]; then
            echo "- 未发现可保留的本地产物。" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🏗️ 构建和测试总结" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **构建成功** - 所有测试通过" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ **构建失败** - 请查看日志和测试报告" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "coverage.xml" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 📊 测试覆盖率" >> "$GITHUB_STEP_SUMMARY"
            if [ "${ACT:-}" = "true" ]; then
              printf '%s\n' '覆盖率报告已在本地生成：`coverage.xml` 和 `coverage_html/`。' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "覆盖率报告已生成，详见 Artifacts。" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          if [ "${{ job.status }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ "${ACT:-}" = "true" ]; then
              printf '%s\n' '失败日志保留在本地目录：`.sage/logs/` 和 `.sage/reports/`。' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "测试日志已上传到 Artifacts，请下载查看详细信息。" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

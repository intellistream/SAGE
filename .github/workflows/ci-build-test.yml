# DEPRECATED (#1466) — Historical split-repo build/test orchestration has been
# replaced by the consolidated main-repo workflow plus independent optional
# adapter/tooling repos. This workflow is preserved for reference only.
# Cross-repo smoke tests: see ci-integration.yml

name: "[DEPRECATED] Build and Test (monorepo)"

on:
  workflow_dispatch:  # manual only — automatic triggers removed (#1466)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  SILICONCLOUD_API_KEY: ${{ secrets.SILICONCLOUD_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
  ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
  GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
  HF_ENDPOINT: https://hf-mirror.com
  CACHE_VERSION: v2-simplified-prod

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 278 个测试需要更多时间
    # Skip version bump commits to avoid unnecessary CI runs
    if: ${{ !contains(github.event.head_commit.message, '[version bump]') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          clean: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Detect LLM endpoint (prefer local)
        run: |
          # CI fallback only: DashScope is explicit fallback for CI environment
          # Local development should NOT use this; always prefer local endpoints
          DEFAULT_BASE="https://dashscope.aliyuncs.com/compatible-mode/v1"
          SELECTED_BASE="$DEFAULT_BASE"
          for port in 8888 8901; do
            if curl -s "http://localhost:${port}/v1/models" > /dev/null 2>&1; then
              SELECTED_BASE="http://localhost:${port}/v1"
              break
            fi
          done
          echo "OPENAI_BASE_URL=$SELECTED_BASE" >> $GITHUB_ENV

      - name: Create .env File from Secrets
        run: |
          echo "🔐 从 GitHub Secrets 创建 .env 文件..."
          cat > .env << EOF
          # CI Environment Configuration (Auto-generated from GitHub Secrets)

          # LLM Service API Keys
          OPENAI_API_KEY=${{ secrets.ALIBABA_API_KEY }}
          OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
          OPENAI_MODEL_NAME=qwen-turbo-2025-02-11

          SILICONCLOUD_API_KEY=${{ secrets.SILICONCLOUD_API_KEY }}
          JINA_API_KEY=${{ secrets.JINA_API_KEY }}
          ALIBABA_API_KEY=${{ secrets.ALIBABA_API_KEY }}

          SAGELLM_API_KEY=EMPTY
          SAGELLM_BASE_URL=http://localhost:8901/v1
          SAGELLM_MODEL_NAME=Qwen/Qwen2.5-7B-Instruct

          WEB_SEARCH_API_KEY=${{ secrets.WEB_SEARCH_API_KEY }}

          # GitHub Token
          GIT_TOKEN=${{ secrets.GIT_TOKEN }}

          # Hugging Face
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          HF_ENDPOINT=https://hf-mirror.com

          # CI/CD Settings
          SAGE_DEBUG=false
          SAGE_SKIP_CPP_EXTENSIONS=false
          SAGE_LOG_LEVEL=INFO
          SAGE_TEST_MODE=true

          # Ray Configuration (fix ray.dag.compiled_dag_node error)
          RAY_ACCEL_ENV_VAR_OVERRIDE_ON_ZERO=0
          EOF

          echo "✅ .env 文件创建完成"

      - name: Install System Dependencies
        run: |
          echo "🔧 安装系统依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            libopenblas-dev \
            liblapack-dev \
            git

          echo "✅ 系统依赖安装完成"

      - name: Install SAGE
        run: |
          echo "🚀 安装SAGE（开发模式，可编辑安装 + C++扩展）..."

          export PATH="$HOME/.local/bin:$PATH"

          # 使用 CI 安装包装器，确保与本地安装方式一致
          chmod +x ./tools/install/installers/ci_install_wrapper.sh
          chmod +x ./quickstart.sh

          echo "开始安装..."
          # 使用开发模式，这样会进行可编辑安装（pip install -e），.so文件会在源码目录中
          ./tools/install/installers/ci_install_wrapper.sh --dev --yes

          echo "✅ 安装完成"
        timeout-minutes: 25

      - name: Install Optional Dependencies
        run: |
          echo "📦 安装可选依赖（用于测试）..."
          export PATH="$HOME/.local/bin:$PATH"

          # 安装可选的算法库（测试需要）
          pip install --no-cache-dir \
            isage-agentic \
            isage-finetune \
            isage-rag \
            isage-eval \
            isage-privacy \
            isage-safety \
            isage-data

          # 安装向量数据库SDK（测试需要）
          pip install --no-cache-dir \
            pymilvus \
            chromadb

          # 安装AI工具SDK（测试需要）
          pip install --no-cache-dir \
            easyocr \
            ollama \
            tenacity \
            zhipuai \
            cohere \
            boto3 \
            datasets \
            torch \
            torchvision \
            transformers \
            peft \
            numpy

          # 安装测试依赖（MCP server tests需要）
          pip install --no-cache-dir \
            fastapi \
            httpx

          echo "✅ 可选依赖安装完成"

      - name: Verify PyPI Packages
        run: |
          echo "📦 验证独立 PyPI 包安装状态..."

          # 这些组件已独立为 PyPI 包，不再作为 C++ 扩展编译
          declare -a packages=(
            "isage-vdb:sagevdb:SageVDB 向量数据库"
            "isage-flow:sage_flow:SageFlow 流处理引擎"
            "isage-tsdb:sage_tsdb:SageTSDB 时序数据库"
            "isage-refiner:sage_refiner:SageRefiner 上下文压缩"
          )

          available=0
          total=${#packages[@]}

          echo ""
          echo "🔍 检查独立包安装状态:"
          for pkg_info in "${packages[@]}"; do
            IFS=':' read -r pip_name module_name display_name <<< "$pkg_info"

            # 使用临时文件捕获输出，避免管道导致的子shell问题
            if python -c "import ${module_name}" 2>/dev/null; then
              version=$(python -c "import ${module_name}; print(getattr(${module_name}, '__version__', 'unknown'))" 2>/dev/null || echo "unknown")
              echo "  ✅ ${display_name} (${pip_name}): ${version}"
              available=$((available + 1))
            else
              echo "  ⚠️  ${display_name} (${pip_name}): 不可用"
              echo "     安装命令: pip install ${pip_name}"
            fi
          done

          echo ""
          echo "📊 总结: ${available}/${total} 个包可用"

          if [ $available -eq 0 ]; then
            echo ""
            echo "❌ 错误: 没有独立包可用"
            echo "💡 这些包应该在安装过程中自动安装"
            echo "   请检查 quickstart.sh 或安装脚本的输出"
            exit 1
          elif [ $available -lt $total ]; then
            echo ""
            echo "⚠️  警告: 部分包不可用 ($((total - available))/${total})"
            echo "   某些高级功能可能受限，但不影响核心功能"
            echo "   这是预期行为 - 这些包是可选依赖"
          else
            echo ""
            echo "✅ 所有独立包已正确安装"
          fi

      - name: Verify Installation
        run: |
          echo "✅ 验证SAGE安装..."
          python -c "import sage; print('✅ SAGE imported')"
          python -c "import sage.common; print('✅ sage.common imported')"

          # 验证CLI
          if command -v sage-dev >/dev/null 2>&1; then
            sage-dev --help > /dev/null && echo "✅ sage-dev CLI可用"
          else
            echo "❌ sage-dev CLI不可用"
            exit 1
          fi

      - name: Set up Directories
        run: |
          echo "📁 创建必要的目录结构..."
          mkdir -p .sage/reports
          mkdir -p .sage/logs
          echo "✅ 目录创建完成"

      # Note: sage-studio has been moved to an independent repository
      # (https://github.com/intellistream/sage-studio)
      # Frontend checks are no longer part of the main SAGE CI pipeline

      - name: Run installation validation suite
        run: |
          echo "🔍 Running installation verification suite..."
          bash tools/install/tests/verify_installation.sh

      - name: Run Unit Tests with Coverage
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "🧪 运行单元测试并收集覆盖率..."
          echo "使用 sage-dev project test --coverage 命令"

          # 使用 sage-dev 运行测试（排除慢速测试）
          # 注意：不再使用 || exit 0，测试失败时CI应该失败
          sage-dev project test --coverage \
            --coverage-report term,xml,html \
            --jobs 4 \
            --timeout 300 \
            --continue-on-error || {
              echo "❌ 测试失败"
              exit 1
            }

          # 将覆盖率文件移动到根目录以便上传
          if [ -f ".sage/coverage/coverage.xml" ]; then
            cp .sage/coverage/coverage.xml ./coverage.xml
            echo "✅ 覆盖率XML文件已复制到根目录"
          else
            echo "⚠️ 警告: 未找到覆盖率XML文件"
          fi

          # 复制HTML报告
          if [ -d ".sage/coverage/htmlcov" ]; then
            mkdir -p coverage_html
            cp -r .sage/coverage/htmlcov/* coverage_html/
            echo "✅ HTML覆盖率报告已复制"
          fi

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: intellistream/SAGE
          files: ./coverage.xml
          flags: unittests
          name: codecov-sage
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage_html/
            .sage/logs/
          retention-days: 30

      - name: Upload Test Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            .sage/logs/
            .sage/reports/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## 🏗️ 构建和测试总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **构建成功** - 所有测试通过" >> $GITHUB_STEP_SUMMARY

            # 显示覆盖率摘要（如果存在）
            if [ -f "coverage.xml" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### 📊 测试覆盖率" >> $GITHUB_STEP_SUMMARY
              echo "覆盖率报告已生成，详见 Artifacts" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **构建失败** - 请查看日志和测试报告" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "测试日志已上传到 Artifacts，请下载查看详细信息" >> $GITHUB_STEP_SUMMARY
          fi

[pytest]
# pytest configuration for SAGE project

# Minimum Python version
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configure pytest cache to use .sage directory
cache_dir = .sage/cache/pytest

# Configure pytest-benchmark to use .sage directory
benchmark_storage = .sage/benchmarks

# SAGE monorepo is now a pure meta package (isage).
# Per-package tests run in each standalone repo (sage-common, sage-platform, etc.).
# Cross-repo integration smoke tests are driven by .github/workflows/ci-integration.yml.
testpaths =
    packages/sage

# Exclude problematic paths from test collection
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv
    node_modules
    .sage

# Add markers for test organization
markers =
    core: Core module tests
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    skip: Skip this test (needs external dependencies)
    external: Tests that require external services or APIs
    cuda: Requires CUDA
    llm: Requires LLM/API keys
    ray: Requires distributed runtime framework (legacy marker name)
    release: Tests for release builds
    develop: Tests for development builds
    smoke: Smoke tests for basic functionality

# Coverage options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --ignore=.sage/

# Timeout for tests (in seconds)
timeout = 300

# Console output options
console_output_style = progress

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Ignore SWIG-related warnings from C++ extensions
    ignore:builtin type Swig.*:DeprecationWarning
    ignore:builtin type swigvarlink.*:DeprecationWarning

# Pre-commit hooks configuration for SAGE packages
#
# Install:
#   ./quickstart.sh        (recommended — also sets up post-commit / pre-push)
#   pre-commit install     (equivalent)
#
# Run manually:
#   pre-commit run --all-files
#   pre-commit run --files src/

default_language_version:
  python: python3.11

repos:
  # ── General file checks ──────────────────────────────────────────────────
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
    args: [--markdown-linebreak-ext=md]
  - id: end-of-file-fixer
  - id: check-yaml
    args: [--unsafe]
  - id: check-json
  - id: check-toml
  - id: check-added-large-files
    args: ["--maxkb=500"]
  - id: check-merge-conflict
  - id: check-case-conflict
  - id: mixed-line-ending
    args: [--fix=lf]
  - id: detect-private-key
  - id: no-commit-to-branch
    name: block direct commits to main
    args: [--branch, main]

  # ── Python: Ruff linter and formatter ───────────────────────────────────
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.2
  hooks:
  - id: ruff
    name: ruff check
    args: [--fix, --exit-non-zero-on-fix]
    files: ^(src|tests)/.*\.py$
  - id: ruff-format
    name: ruff format
    files: ^(src|tests)/.*\.py$

  # ── SAGE policy checks ───────────────────────────────────────────────────
- repo: local
  hooks:
  - id: no-requirements-txt
    name: forbid requirements.txt (use pyproject.toml)
    entry: bash -c 'echo "requirements.txt is forbidden — declare deps in pyproject.toml."; exit 1'
    language: system
    files: ^requirements.*\.txt$
    pass_filenames: false

  - id: no-venv-creation
    name: forbid venv/virtualenv creation in scripts
    entry: bash -c 'if grep -nE "python -m venv|virtualenv|--auto-venv" "$@"; then echo "Creating venvs is forbidden in SAGE repos — use conda."; exit 1; fi'
    language: system
    types: [shell]
    pass_filenames: true

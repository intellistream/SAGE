name: Version Source Guard

on:
  push:
    branches: [main, main-dev]
  pull_request:
    branches: [main, main-dev]

jobs:
  version-source-guard:
    name: Validate single version source (_version.py)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Validate version source of truth
      run: |
        python - <<'PY'
        from __future__ import annotations

        import re
        import sys
        import tomllib
        from pathlib import Path

        root = Path(".")
        pyproject = root / "pyproject.toml"
        if not pyproject.exists():
            print("No pyproject.toml found — skipping version source guard.")
            raise SystemExit(0)

        data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
        project = data.get("project", {})

        # 1. project.version must NOT be hardcoded
        if "version" in project:
            raise SystemExit("[FAIL] project.version must not be hardcoded in pyproject.toml")

        # 2. [project].dynamic must include "version"
        if "version" not in project.get("dynamic", []):
            raise SystemExit("[FAIL] [project].dynamic must include 'version'")

        # 3. [tool.setuptools.dynamic].version.attr must end with ._version.__version__
        attr = (
            data.get("tool", {})
            .get("setuptools", {})
            .get("dynamic", {})
            .get("version", {})
            .get("attr", "")
        )
        if not attr.endswith("._version.__version__"):
            raise SystemExit(
                "[FAIL] [tool.setuptools.dynamic].version.attr must point to "
                "<package>._version.__version__"
            )

        # 4. Check per-package constraints
        src = root / "src"
        if not src.exists():
            print("No src/ directory — skipping package file checks.")
            raise SystemExit(0)

        package_dirs = [
            p for p in src.iterdir()
            if p.is_dir() and (p / "__init__.py").exists()
            and not p.name.endswith(".egg-info")
        ]
        if not package_dirs:
            print("No packages found under src/ — skipping package file checks.")
            raise SystemExit(0)

        errors: list[str] = []
        for pkg_dir in package_dirs:
            pkg = pkg_dir.name
            version_file = pkg_dir / "_version.py"
            init_file = pkg_dir / "__init__.py"

            if not version_file.exists():
                errors.append(f"[FAIL] missing {version_file}")
                continue

            version_text = version_file.read_text(encoding="utf-8")
            if not re.search(r'^__version__\s*=\s*"[^"]+"', version_text, re.M):
                errors.append(f'[FAIL] {version_file} must define __version__ = "X.Y.Z[.N]"')

            init_text = init_file.read_text(encoding="utf-8")
            import_ok = any(re.search(p, init_text, re.M) for p in [
                rf"^from\s+{re.escape(pkg)}\._version\s+import\s+__version__",
                r"^from\s+\._version\s+import\s+__version__",
            ])
            if not import_ok:
                errors.append(f"[FAIL] {init_file} must import __version__ from _version.py")

            if re.search(r'^__version__\s*=\s*"[^"]+"', init_text, re.M):
                errors.append(f"[FAIL] {init_file} must NOT hardcode __version__")

        if errors:
            print("\n".join(errors))
            raise SystemExit(1)

        print("[PASS] Version source of truth checks passed.")
        PY

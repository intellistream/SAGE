coverage:
  status:
    project:
      default:
        target: 60%          # minimum coverage threshold
        threshold: 5%        # tolerated drop before CI fails
    patch:
      default:
        target: 50%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
- "tests/**"
- "examples/**"
- "docs/**"
- "**/__init__.py"
- "**/_version.py"

name: Publish manylinux wheel to PyPI

on:
  push:
    tags:
    - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip upload)"
        required: false
        default: "false"
        type: boolean

jobs:
  build-manylinux:
    name: Build manylinux2014 wheel
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install cibuildwheel
      run: pip install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --output-dir dist
      env:
        CIBW_BUILD: "cp${{ matrix.python-version }}-manylinux_x86_64"
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
        CIBW_BEFORE_BUILD: "pip install pybind11 scikit-build-core"

    - name: Upload wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ matrix.python-version }}
        path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-manylinux
    if: ${{ github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: read

    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: dist/
        skip-existing: true

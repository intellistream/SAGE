cluster:
  name: sage-docker-cluster-8node

ssh:
  user: root
  identity_file: /root/.ssh/id_ed25519

nodes:
- node_id: sage-node-1
  ssh_target: sage-node-1
  bind_address: sage-node-1:19001
  resources:
    cpu: 8
    memory_gb: 16
    role: head
  metadata:
    dataset_root: /shared/datasets
    result_root: /shared/results
    role: head
    runtime_env: sagellm

- node_id: sage-node-2
  ssh_target: sage-node-2
  bind_address: sage-node-2:19001
  resources:
    cpu: 8
    memory_gb: 12
    role: worker

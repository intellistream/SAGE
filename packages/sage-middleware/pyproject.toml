[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"


[project]
name = "isage-middleware"
dynamic = ["version"]
description = "SAGE Middleware - Streaming-Augmented Generative Execution"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "IntelliStream Team", email = "shuhao_zhang@hust.edu.cn" }]
keywords = [
    "data",
    "api",
    "reasoning",
    "dataflow",
    "llm",
    "ml",
    "middleware",
    "framework",
    "rag",
    "intellistream",
    "ai",
    "sage",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]
dependencies = [
    # ============================================================================
    # 核心依赖 - sage.middleware 运行时必需的所有依赖
    # ============================================================================
    # API clients - required for LLM integrations
    "openai>=1.52.0,<1.91.0",
    "httpx>=0.28.0,<1.0.0",

    # Network utilities - required for operators
    "aiohttp>=3.12.0,<4.0.0",
    "beautifulsoup4>=4.12.0,<5.0.0", # Web scraping operators
    "feedparser>=6.0.11,<7.0.0",     # RSS feed operators

    # JSON handling - for LongRefiner
    "json_repair>=0.30.0,<1.0.0",

    # BM25 retrieval - lightweight keyword search
    "bm25s>=0.2.13,<1.0.0",
    "rank-bm25>=0.2.0,<1.0.0",
    "PyStemmer>=3.0.0,<4.0.0",

    # C++ 扩展包（已独立为 PyPI 包）
    "isage-vdb>=0.2.0",        # SageVDB 向量数据库
    "isage-flow>=0.2.0",       # SageFlow 流处理引擎
    "isage-tsdb>=0.2.0",       # SageTSDB 时序数据库
    "isage-neuromem>=0.2.0",   # NeuroMem 内存系统
    "isage-refiner>=0.2.0",    # SageRefiner 上下文压缩

    # 向量数据库依赖
    "faiss-cpu>=1.7.4",        # FAISS 向量检索（CPU 版本）
    # 注意: 如需 GPU 版本，请手动卸载 faiss-cpu 并安装 faiss-gpu:
    #       pip uninstall faiss-cpu && conda install -c conda-forge faiss-gpu
]
license = { text = "MIT" }

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff==0.14.6",
    "pybind11>=2.10.0",
]
[project.urls]
Homepage = "https://github.com/intellistream/SAGE"
Repository = "https://github.com/intellistream/SAGE.git"
Documentation = "https://intellistream.github.io/SAGE-Pub/"
Issues = "https://github.com/intellistream/SAGE/issues"

[project.scripts]

# ============================================================================
# scikit-build-core configuration
# ============================================================================

[tool.pytest.ini_options]
testpaths = ["tests", "src"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--benchmark-storage=../../.sage/benchmarks",
    "-o",
    "cache_dir=../../.sage/cache/pytest",
    "--strict-markers",
    "--strict-config",
    "--verbose",
    "-ra",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "network: marks tests as network tests",
    "system: marks tests as system tests",
    "core: marks tests as core functionality tests",
    "smoke: marks tests as smoke tests (quick validation)",
    "cli: marks tests as CLI tests",
    "external: marks tests that require external services or APIs",
]

[tool.coverage.run]
source = ["src/sage"]
omit = ["*/tests/*", "*/test_*.py", "*/_test_*.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]
include = "\\.pyi?$"
extend-exclude = "/(\n    \\.git\n    | \\.venv\n    | build\n    | dist\n)/\n"

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 100
known_first_party = ["sage"]

# ============================================================================
# Code Quality Configuration
# Extends from root ruff.toml for unified standards across all packages
# ============================================================================
[tool.ruff]
extend = "../../tools/ruff.toml"

# Package discovery (PEP 420 namespace)
[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

# Version from _version.py (setuptools-scm alternative for manual versioning)
[tool.setuptools.dynamic]
version = { attr = "sage.middleware._version.__version__" }

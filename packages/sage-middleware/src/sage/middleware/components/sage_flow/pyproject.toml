[build-system]
requires = [
    "wheel",
    "pybind11>=2.10.0",
    "cmake>=3.16",
    "ninja",
    "scikit-build-core>=0.10.0",
    "numpy>=1.21.0"
]
build-backend = "scikit_build_core.build"

[project]
name = "sageflow"
version = "1.0.0"
description = "SAGE Flow - High-Performance Stream Processing Framework with C++ Extensions"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "IntelliStream Team", email = "intellistream@outlook.com"}
]
maintainers = [
    {name = "SAGE Flow Development Team"}
]
keywords = [
    "stream-processing",
    "data-flow",
    "machine-learning",
    "vector-search",
    "multimodal",
    "cpp-extensions"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: MacOS X",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]
requires-python = ">=3.9"

# 核心运行时依赖（支持DSL类型提示和NumPy集成）
dependencies = [
    "numpy>=1.21.0",
    "pybind11>=2.10.0",
    "typing-extensions>=4.0.0",
]

# 可选依赖组
[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-xdist>=3.0",
    "black>=22.0",
    "isort>=5.10",
    "mypy>=1.5.1",  # 更新mypy支持新DSL类型提示
    "flake8>=5.0",
    "pre-commit>=2.20",
    "build>=0.8",
    "twine>=4.0",
]

test = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-xdist>=3.0",
    "pytest-benchmark>=4.0",
    "hypothesis>=6.0",
]

docs = [
    "sphinx>=5.0",
    "sphinx-rtd-theme>=1.0",
    "myst-parser>=0.18",
    "sphinx-autoapi>=2.0",
]

performance = [
    "memory-profiler>=0.60",
    "psutil>=5.9",
    "py-spy>=0.3",
]

# 完整开发环境
all = [
    "sage-flow[dev,test,docs,performance]"
]

[project.urls]
Homepage = "https://github.com/intellistream/SAGE"
Repository = "https://github.com/intellistream/SAGE"
Documentation = "https://sage-flow.readthedocs.io/"
Issues = "https://github.com/intellistream/SAGE/issues"
Changelog = "https://github.com/intellistream/SAGE/blob/main/packages/sage-middleware/src/sage/middleware/enterprise/sage_flow/CHANGELOG.md"

[project.scripts]
sage-flow = "sage_flow.cli:main"

# scikit-build-core 配置

# Black 代码格式化配置
[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # 排除构建目录
  build/
  | dist/
  | \.eggs/
  | \.git/
  | \.mypy_cache/
  | \.pytest_cache/
  | \.venv/
  | venv/
)/
'''

# isort 导入排序配置
[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

# MyPy 类型检查配置
[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
show_error_codes = true

[[tool.mypy.overrides]]
module = [
    "sage_flow_datastream",  # C++ 扩展模块
]
ignore_missing_imports = true

# Pytest 配置
[tool.pytest.ini_options]
minversion = "7.0"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--cov=sage_flow",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "performance: marks tests as performance benchmarks",
    "gpu: marks tests that require GPU",
]

# Coverage 配置
[tool.coverage.run]
source = ["sage_flow"]
omit = [
    "*/tests/*",
    "*/test_*",
    "setup.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

# Flake8 配置 (在 .flake8 文件中定义)
# 这里仅作为参考，实际配置在 .flake8 文件中
# [flake8]
# max-line-length = 100
# extend-ignore = E203, W503
# max-complexity = 10
# per-file-ignores = 
#     __init__.py:F401
#     tests/*:S101,S311

# Bandit 安全检查配置
[tool.bandit]
exclude_dirs = ["tests", "build", "dist"]
skips = ["B101", "B601"]

# scikit-build-core 配置
[tool.scikit-build]
# CMake 配置
cmake.version = ">=3.16"
cmake.source-dir = "."
cmake.build-type = "Release"
cmake.args = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DPython_EXECUTABLE={python}",
    "-DPython_ROOT_DIR={python}",
    "-DPython_FIND_STRATEGY=LOCATION",
    "-DENABLE_DEV_TOOLS=OFF",
    "-DBUILD_TESTING=OFF"
]

# 构建配置
build-dir = "build/{wheel_tag}"
build.verbose = false

# 轮子配置
wheel.packages = ["sageflow"]
wheel.py-api = "py3"
wheel.expand-macos-universal-tags = true

# 安装配置
install.strip = true

# 日志配置
logging.level = "INFO"

# 元数据配置
metadata.version.provider = "scikit_build_core.metadata.regex"
metadata.version.input = "sageflow/__init__.py"

# 可编辑安装支持（支持开发时热重载DSL变化）
editable.mode = "redirect"
editable.rebuild = true

# 构建配置
[tool.cibuildwheel]
# 构建轮子的平台
build = ["cp39-*", "cp310-*", "cp311-*", "cp312-*"]
skip = ["*-win32", "*-manylinux_i686"]

# 测试命令
test-command = "pytest tests"
test-requires = ["pytest", "numpy"]

# Linux 特定配置
[tool.cibuildwheel.linux]
before-all = [
    "yum install -y cmake3 && ln -sf /usr/bin/cmake3 /usr/bin/cmake",
    "yum install -y devtoolset-9-toolchain",
]
environment = { CC="/opt/rh/devtoolset-9/root/usr/bin/gcc", CXX="/opt/rh/devtoolset-9/root/usr/bin/g++" }

# macOS 特定配置
[tool.cibuildwheel.macos]
before-all = [
    "brew install cmake",
]
environment = { MACOSX_DEPLOYMENT_TARGET="10.15" }
# ============================================================================
# SAGE Common — MONOREPO STUB
# ============================================================================
# ⚠️  MIGRATED: This package has been extracted to a standalone repository.
#
#   Standalone repo : https://github.com/intellistream/sage-common
#   PyPI package    : isage-common
#   Import path     : sage.common
#
# This file is kept as an install-time stub so that
# `pip install -e packages/sage-common` in the SAGE monorepo dev workflow
# resolves to the standalone package automatically.
#
# DO NOT add source code back to src/ here.
# All changes must go to intellistream/sage-common.
# ============================================================================

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "isage-common-stub"
version = "0.2.4.13"
description = "[STUB] Redirects to isage-common standalone repo (intellistream/sage-common)"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    { name = "IntelliStream Team", email = "shuhao_zhang@hust.edu.cn" },
]

# ── The stub depends on the real standalone package ──────────────────────────
dependencies = [
    "isage-common>=0.2.4.13",
]

[project.optional-dependencies]
dev = [
    "isage-common[dev]>=0.2.4.13",
]

[project.urls]
Homepage    = "https://github.com/intellistream/sage-common"
Repository  = "https://github.com/intellistream/sage-common"
Issues      = "https://github.com/intellistream/sage-common/issues"
Monorepo    = "https://github.com/intellistream/SAGE"

# No [tool.setuptools.packages.find] — stub provides no source code.
# sage.common is provided entirely by the isage-common package from PyPI
# or from intellistream/sage-common installed in editable mode.
